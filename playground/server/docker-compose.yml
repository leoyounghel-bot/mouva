services:
  server:
    build: .
    restart: always
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5800
      - FRONTEND_URL=https://mouva.ai
    expose:
      - "5800"

  caddy:
    image: caddy:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server

volumes:
  caddy_data:
  caddy_config:

